# Deploy workflow for wa-voicenote-triage.
#
# Active since c14 (2026-05-11). Builds the image, pushes to GHCR, then
# rolls the Container App `wa-voicenote` in `rg-wa-voicenote` forward to
# the new revision. On /health smoke-test failure, rolls back to the
# previous active revision.
#
# Required repo secrets (set in c14): AZURE_CLIENT_ID, AZURE_TENANT_ID,
# AZURE_SUBSCRIPTION_ID. OIDC federated identity is bound to ref=main and
# pull_request contexts of the kevinleonj/wa-voicenote-triage repo.

name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# id-token: write is required for OIDC federation to Azure.
# packages:  write is required to push images to GHCR.
# contents:  read covers checkout.
permissions:
  contents: read
  id-token: write
  packages: write

# Deploys must complete; never cancel a deploy that is already running.
concurrency:
  group: deploy
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  deploy:
    name: build + push + container app update
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
      RESOURCE_GROUP: rg-wa-voicenote
      CONTAINER_APP: wa-voicenote

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure GHCR package is public
        # Container Apps does not authenticate to GHCR by default. Making the
        # image public is the simplest unblock; the alternative is to wire a
        # dedicated read-only PAT as a Container App registry credential.
        # Idempotent: a no-op if already public.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X PATCH \
            "/user/packages/container/wa-voicenote-triage/visibility" \
            -f visibility=public || \
            echo "Visibility change skipped (likely already public or first push)."

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Capture previous revision for rollback
        id: previous
        run: |
          prev=$(az containerapp revision list \
            --name "${{ env.CONTAINER_APP }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "[?properties.active].name | [0]" -o tsv)
          echo "revision=$prev" >> "$GITHUB_OUTPUT"
          echo "Previous active revision: $prev"

      - name: Update Container App image
        run: |
          az containerapp update \
            --name "${{ env.CONTAINER_APP }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ env.IMAGE_NAME }}:${{ github.sha }}"

      - name: Resolve new revision and revision-specific FQDN
        id: revision
        run: |
          # Pick the most-recently-created revision (the one we just rolled out).
          new_revision=$(az containerapp revision list \
            --name "${{ env.CONTAINER_APP }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "sort_by([], &properties.createdTime)[-1].name" -o tsv)
          # The revision exposes its own FQDN via properties.fqdn — read it
          # directly instead of trying to construct it from the base FQDN.
          revision_fqdn=$(az containerapp revision show \
            --name "${{ env.CONTAINER_APP }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --revision "$new_revision" \
            --query properties.fqdn -o tsv)
          base_fqdn=$(az containerapp show \
            --name "${{ env.CONTAINER_APP }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "new_revision=$new_revision" >> "$GITHUB_OUTPUT"
          echo "base_fqdn=$base_fqdn" >> "$GITHUB_OUTPUT"
          echo "revision_fqdn=$revision_fqdn" >> "$GITHUB_OUTPUT"
          echo "New revision: $new_revision"
          echo "Revision FQDN: $revision_fqdn"

      - name: Smoke test /health on the new revision
        id: smoke
        run: |
          # Probe the revision-specific hostname so we don't accidentally pass
          # against the old revision while the new one is still cold-starting.
          # 10 attempts x 15s = up to 150s for cold-start + image pull.
          url="https://${{ steps.revision.outputs.revision_fqdn }}/health"
          echo "Probing $url"
          for i in $(seq 1 10); do
            if curl --fail --silent --max-time 10 "$url"; then
              echo ""
              echo "smoke OK on attempt $i"
              exit 0
            fi
            echo "smoke attempt $i failed, retrying..."
            sleep 15
          done
          echo "smoke test failed after 10 attempts"
          exit 1

      - name: Rollback on smoke failure
        if: failure() && steps.smoke.conclusion == 'failure' && steps.previous.outputs.revision != ''
        run: |
          echo "Rolling back to revision ${{ steps.previous.outputs.revision }}"
          az containerapp ingress traffic set \
            --name "${{ env.CONTAINER_APP }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --revision-weight "${{ steps.previous.outputs.revision }}=100"
